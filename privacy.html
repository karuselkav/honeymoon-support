            meta: "Politique de confidentialité Honeymoon: données, IA, analytique, droits.",
            h1: "Politique de confidentialité",
            last: "Dernière mise à jour : {{date}}",
            navSupport: "Assistance",
            navPrivacy: "Confidentialité",
            langLabel: "Langue",
            themeL: "Thème clair",
            themeD: "Thème sombre",
            footer: "Honeymoon. La page d’assistance est sous « Assistance ».",
            policyNote: "L’intégralité du texte juridique ci-dessous est en anglais et fait foi.",
          },
          it: {
            pageTitle: "Honeymoon — Privacy",
            meta: "Informativa privacy Honeymoon: dati, IA, analytics, diritti.",
            h1: "Informativa sulla privacy",
            last: "Aggiornamento: {{date}}",
            navSupport: "Assistenza",
            navPrivacy: "Privacy",
            langLabel: "Lingua",
            themeL: "Tema chiaro",
            themeD: "Tema scuro",
            footer: "Honeymoon. La pagina di assistenza è nella scheda Assistenza.",
            policyNote: "L’informativa completa di seguito è in inglese e fa fede a fini legali.",
          },
        };

        (function copyEnBlocks() {
          ["hi", "es", "de", "fr", "it"].forEach(function (c) {
            I[c].blocks = JSON.parse(JSON.stringify(I.en.blocks));
          });
        })();

        function getQueryLang() {
          try {
            var p = new URLSearchParams(window.location.search).get("lang");
            if (p && LANGS.some(function (l) { return l.code === p; })) return p;
            var s = localStorage.getItem(LS_LANG);
            if (s && LANGS.some(function (l) { return l.code === s; })) return s;
          } catch (e) {}
          var n = (navigator.languages && navigator.languages[0]) || navigator.language || "en";
          n = n.split("-")[0].toLowerCase();
          if (LANGS.some(function (l) { return l.code === n; })) return n;
          return "en";
        }

        var currentLang = getQueryLang();

        function t() {
          var tr = I[currentLang];
          if (tr && tr.blocks && tr.blocks.length) return tr;
          return I.en;
        }

        function fill(str) {
          if (!str) return "";
          return str
            .split("{{email}}")
            .join(CONTACT)
            .split("{{date}}")
            .join(LASTUPD);
        }

        function esc(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function renderArticle() {
          var tr = t();
          var art = document.getElementById("legal-article");
          if (!art) return;
          var isEnBody = "hi" === currentLang || "es" === currentLang || "de" === currentLang || "fr" === currentLang || "it" === currentLang;
          if (isEnBody) {
            art.setAttribute("lang", "en");
          } else {
            art.setAttribute("lang", currentLang);
          }
          var html = "";
          (tr.blocks || []).forEach(function (b) {
            html += "<h2>" + esc(b.h) + "</h2>";
            (b.p || []).forEach(function (para) {
              html += "<p>" + fill(para) + "</p>";
            });
            if (b.ul && b.ul.length) {
              html += "<ul>";
              b.ul.forEach(function (li) {
                html += "<li>" + esc(li) + "</li>";
              });
              html += "</ul>";
            }
          });
          if (isEnBody && t().policyNote) {
            html = '<p class="policy-note" style="font-size:0.85rem;color:var(--text-muted);margin:0 0 1rem">' + esc(
              t().policyNote
            ) + "</p>" + html;
          }
          art.innerHTML = html;
        }

        function applyMeta(tr) {
          document.title = tr.pageTitle;
          var md = document.getElementById("meta-desc");
          if (md) md.setAttribute("content", tr.meta);
          var ogt = document.getElementById("og-title");
          if (ogt) ogt.setAttribute("content", tr.pageTitle);
          var ogo = document.getElementById("meta-og");
          if (ogo) ogo.setAttribute("content", tr.meta);
        }

        function getTheme() {
          return document.documentElement.getAttribute("data-theme") || "dark";
        }

        function setMetaTheme() {
          var m = document.getElementById("meta-theme");
          if (m) m.setAttribute("content", "light" === getTheme() ? "#fff8fb" : "#0a0714");
        }

        function initTheme() {
          var s = null;
          try {
            s = localStorage.getItem(LS_THEME) || localStorage.getItem(THEME_LEGACY);
          } catch (e) {}
          if (s === "light" || s === "dark") {
            document.documentElement.setAttribute("data-theme", s);
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
            document.documentElement.setAttribute("data-theme", "light");
          } else {
            document.documentElement.setAttribute("data-theme", "dark");
          }
          setMetaTheme();
          var light = "light" === getTheme();
          var suns = document.querySelectorAll(".t-sun");
          var moons = document.querySelectorAll(".t-moon");
          suns.forEach(function (el) {
            el.style.display = light ? "none" : "block";
          });
          moons.forEach(function (el) {
            el.style.display = light ? "block" : "none";
          });
        }

        function toggleTheme() {
          var n = "light" === getTheme() ? "dark" : "light";
          try {
            localStorage.setItem(LS_THEME, n);
          } catch (e) {}
          document.documentElement.setAttribute("data-theme", n);
          setMetaTheme();
          var light = n === "light";
          document.querySelectorAll(".t-sun").forEach(function (el) {
            el.style.display = light ? "none" : "block";
          });
          document.querySelectorAll(".t-moon").forEach(function (el) {
            el.style.display = light ? "block" : "none";
          });
          if (window.lucide) window.lucide.createIcons();
          setThemeA11y();
        }

        function setThemeA11y() {
          var tr = t();
          var b = document.getElementById("theme-toggle");
          if (!b) return;
          b.setAttribute("aria-label", "light" === getTheme() ? tr.themeD : tr.themeL);
        }

        function linkWithLang(href) {
          var u = currentLang && currentLang !== "en" ? href + (href.indexOf("?") >= 0 ? "&" : "?") + "lang=" + encodeURIComponent(currentLang) : href;
          return u;
        }

        function updateShell() {
          var tr = t();
          currentLang = document.getElementById("lang-select").value;
          try {
            localStorage.setItem(LS_LANG, currentLang);
          } catch (e) {}
          if (window.history && window.history.replaceState) {
            var u = new URL(window.location.href);
            if (currentLang && currentLang !== "en") u.searchParams.set("lang", currentLang);
            else u.searchParams.delete("lang");
            history.replaceState({}, "", u.toString());
          }
          document.documentElement.setAttribute("lang", currentLang);
          document.getElementById("h1").textContent = tr.h1;
          document.getElementById("last-upd").textContent = fill(tr.last);
          document.getElementById("lang-label").textContent = tr.langLabel;
          document.getElementById("nav-support").textContent = tr.navSupport;
          document.getElementById("nav-privacy").textContent = tr.navPrivacy;
          document.getElementById("footer-hint").textContent = tr.footer;
          document.getElementById("nav-support").setAttribute("href", linkWithLang("index.html"));
          document.getElementById("nav-privacy").setAttribute("href", linkWithLang("privacy.html"));
          document.getElementById("brand-link").setAttribute("href", linkWithLang("index.html"));
          applyMeta(tr);
          renderArticle();
          setThemeA11y();
          if (window.lucide) lucide.createIcons();
        }

        function ready() {
          var sel = document.getElementById("lang-select");
          LANGS.forEach(function (L) {
            var o = document.createElement("option");
            o.value = L.code;
            o.textContent = L.name;
            sel.appendChild(o);
          });
          sel.value = currentLang;
          sel.addEventListener("change", updateShell);
          document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
          initTheme();
          updateShell();
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", ready);
        } else {
          ready();
        }
      })();
    </script>
  </body>
</html>
